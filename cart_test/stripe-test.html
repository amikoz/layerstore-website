<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LayerStore - Kasse</title>
    <style>
        :root {
            --bg-primary: #FAF9F0;
            --text-primary: #1a1a1a;
            --accent: #232F3D;
            --success: #28a745;
            --error: #dc3545;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }

        .badge {
            display: inline-block;
            background: #ffc107;
            color: #000;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .section {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .section h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: var(--bg-primary);
            border-radius: 8px;
            margin-bottom: 0.75rem;
        }

        .item-info h3 {
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
        }

        .item-info p {
            font-size: 0.8rem;
            color: #666;
        }

        .item-details {
            text-align: right;
        }

        .item-quantity {
            font-size: 0.85rem;
            color: #888;
        }

        .item-price {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
        }

        .total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 2px solid #eee;
            margin-top: 1rem;
        }

        .total-label {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .total-amount {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-stripe {
            background: #635BFF;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-stripe:hover {
            background: #4a45c2;
        }

        .btn-stripe:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--accent);
            color: white;
            margin-top: 0.75rem;
        }

        .btn-secondary:hover {
            background: #1a2530;
        }

        .btn-back {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            margin-top: 1rem;
        }

        .btn-back:hover {
            background: var(--accent);
            color: white;
        }

        .status {
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .status.info {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.success {
            background: #d4edda;
            color: var(--success);
        }

        .status.error {
            background: #f8d7da;
            color: var(--error);
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-cart {
            text-align: center;
            padding: 3rem 1rem;
            color: #666;
        }

        .empty-cart svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .test-cards {
            font-size: 0.85rem;
            color: #666;
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .test-cards code {
            background: white;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: monospace;
        }

        .api-config {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }

        .api-config input {
            width: 100%;
            padding: 0.5rem;
            margin-top: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💳 Kasse</h1>
        <span class="badge">TEST MODE</span>

        <div id="cart-content">
            <!-- Cart items will be rendered here -->
        </div>

        <div id="payment-section" style="display: none;">
            <div class="section">
                <h2>💳 Zahlung</h2>

                <div class="api-config">
                    <strong>🔧 API Konfiguration</strong>
                    <p style="margin-top: 0.5rem; font-size: 0.8rem;">
                        Gib die URL zu deinem IONOS API ein:
                    </p>
                    <input
                        type="text"
                        id="api-url"
                        placeholder="https://layerstore.com/api"
                        value="https://layerstore.com/api"
                        onchange="saveApiUrl()"
                    >
                </div>

                <div class="form-group">
                    <label>E-Mail (optional)</label>
                    <input type="email" id="customer-email" placeholder="deine@email.de">
                </div>

                <button class="btn-stripe" id="checkout-btn" onclick="startCheckout()">
                    <span id="checkout-text">⚡ Jetzt bezahlen</span>
                </button>

                <div class="test-cards">
                    <strong>🧪 Testkarte:</strong> <code>4242 4242 4242 4242</code> | Ablauf: beliebig | CVC: 123
                </div>

                <div id="payment-status" class="status info" style="margin-top: 1rem;">
                    ℹ️ Klicke auf "Jetzt bezahlen" um zur Stripe Kasse zu gelangen
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const DEFAULT_API_URL = 'https://layerstore.eu/api';

        // ==================== STORAGE ====================
        function getCheckoutItems() {
            const sessionItems = sessionStorage.getItem('stripe_checkout_items');
            const localCart = localStorage.getItem('layerstore_cart_test') || localStorage.getItem('layerstore_cart');

            let items = [];
            let total = 0;

            if (sessionItems) {
                items = JSON.parse(sessionItems);
                const sessionTotal = sessionStorage.getItem('stripe_checkout_total');
                total = parseInt(sessionTotal) / 100;
            } else if (localCart) {
                const cart = JSON.parse(localCart);
                items = cart.map(item => ({
                    name: item.name,
                    price: item.price,
                    quantity: item.quantity
                }));
                total = cart.reduce((sum, item) => {
                    if (!item.price || item.option === 'individuell') return sum;
                    const priceNum = parseFloat(item.price.replace(',', '.').replace(' €', ''));
                    return sum + (priceNum * item.quantity);
                }, 0);
            }

            return { items, total };
        }

        function saveApiUrl() {
            const url = document.getElementById('api-url').value;
            localStorage.setItem('stripe_api_url', url);
        }

        function getApiUrl() {
            return localStorage.getItem('stripe_api_url') || DEFAULT_API_URL;
        }

        // ==================== RENDER ====================
        function renderCart() {
            const { items, total } = getCheckoutItems();
            const cartContent = document.getElementById('cart-content');
            const paymentSection = document.getElementById('payment-section');

            if (items.length === 0) {
                cartContent.innerHTML = `
                    <div class="section empty-cart">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"/>
                            <circle cx="20" cy="21" r="1"/>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                        </svg>
                        <h3>Warenkorb ist leer</h3>
                        <p>Füge Produkte hinzu, bevor du zur Kasse gehst.</p>
                        <button class="btn-back" onclick="window.location.href='/collections/easter/'">
                            🛍️ Zur Kollektion
                        </button>
                    </div>
                `;
                paymentSection.style.display = 'none';
                return;
            }

            paymentSection.style.display = 'block';

            // Set saved API URL
            document.getElementById('api-url').value = getApiUrl();

            const itemsHTML = items.map(item => {
                const priceDisplay = typeof item.price === 'string'
                    ? item.price
                    : item.price.toFixed(2).replace('.', ',') + ' €';

                return `
                    <div class="cart-item">
                        <div class="item-info">
                            <h3>${item.name}</h3>
                            <p class="item-quantity">Anzahl: ${item.quantity}</p>
                        </div>
                        <div class="item-details">
                            <div class="item-price">${priceDisplay}</div>
                        </div>
                    </div>
                `;
            }).join('');

            cartContent.innerHTML = `
                <div class="section">
                    <h2>📦 Deine Bestellung</h2>
                    ${itemsHTML}
                    <div class="total">
                        <span class="total-label">Gesamt</span>
                        <span class="total-amount">${total.toFixed(2).replace('.', ',')} €</span>
                    </div>
                    <button class="btn-back" onclick="window.location.href='/cart_test/'">
                        ← Zurück zum Warenkorb
                    </button>
                </div>
            `;
        }

        // ==================== CHECKOUT ====================
        async function startCheckout() {
            const { items, total } = getCheckoutItems();
            const apiUrl = getApiUrl();
            const statusEl = document.getElementById('payment-status');
            const btnText = document.getElementById('checkout-text');
            const btn = document.getElementById('checkout-btn');
            const customerEmail = document.getElementById('customer-email').value;

            if (items.length === 0) {
                statusEl.className = 'status error';
                statusEl.innerHTML = '❌ Warenkorb ist leer';
                return;
            }

            // Disable button
            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span> Wird geladen...';
            statusEl.className = 'status info';
            statusEl.innerHTML = '⏳ Verbindung zur Stripe API...';

            try {
                // Prepare items for API
                const apiItems = items.map(item => ({
                    name: item.name,
                    price: parseFloat(item.price?.toString().replace(',', '.')?.replace('€', '') || 0),
                    quantity: item.quantity
                }));

                // Get current URL for redirect
                const baseUrl = window.location.origin + window.location.pathname;

                // Call IONOS API
                const response = await fetch(apiUrl + '/create-checkout.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        items: apiItems,
                        customerEmail: customerEmail || undefined,
                        successUrl: baseUrl + '?success=true',
                        cancelUrl: baseUrl + '?canceled=true'
                    })
                });

                const result = await response.json();

                if (!response.ok || result.error) {
                    throw new Error(result.error || 'API Error');
                }

                if (result.url) {
                    statusEl.className = 'status success';
                    statusEl.innerHTML = '✅ Weiterleitung zu Stripe Checkout...';
                    setTimeout(() => {
                        window.location.href = result.url;
                    }, 500);
                } else {
                    throw new Error('Keine URL vom API erhalten');
                }

            } catch (error) {
                console.error('Checkout error:', error);
                statusEl.className = 'status error';
                statusEl.innerHTML = '❌ Fehler: ' + error.message;

                // Check if it's a CORS error
                if (error.message.includes('fetch') || error.message.includes('network')) {
                    statusEl.innerHTML = `
                        ❌ CORS oder Netzwerk-Fehler.<br>
                        <small>Stelle sicher, dass das API auf IONOS korrekt installiert ist
                        und CORS für ${window.location.origin} erlaubt.</small>
                    `;
                }

                btn.disabled = false;
                btnText.innerHTML = '⚡ Jetzt bezahlen';
            }
        }

        // ==================== SUCCESS CHECK ====================
        function checkSuccess() {
            const urlParams = new URLSearchParams(window.location.search);

            if (urlParams.get('success') === 'true') {
                document.getElementById('payment-status').className = 'status success';
                document.getElementById('payment-status').innerHTML = `
                    ✅ <strong>Zahlung erfolgreich!</strong><br>
                    Vielen Dank für deine Bestellung.<br>
                    <small>Du erhältst in Kürze eine Bestätigung per E-Mail.</small>
                `;

                // Clear cart
                localStorage.removeItem('layerstore_cart');
                localStorage.removeItem('layerstore_cart_test');
                sessionStorage.removeItem('stripe_checkout_items');
                sessionStorage.removeItem('stripe_checkout_total');

                // Update UI after delay
                setTimeout(renderCart, 2000);
            }

            if (urlParams.get('canceled') === 'true') {
                document.getElementById('payment-status').className = 'status info';
                document.getElementById('payment-status').innerHTML = 'ℹ️ Zahlung abgebrochen. Du kannst es jederzeit erneut versuchen.';
            }
        }

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
            checkSuccess();
        });
    </script>
</body>
</html>
