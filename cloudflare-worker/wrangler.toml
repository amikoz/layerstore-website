name = "layerstore-stripe-webhook"
main = "stripe-webhook.js"
compatibility_date = "2024-01-01"

# Environment variables (nicht in Git committen!)
# Via: wrangler secret put STRIPE_WEBHOOK_SECRET

# Routes für layerstore.eu
routes = [
  { pattern = "webhook.layerstore.eu/*", zone_name = "layerstore.eu" }
]

# KV Namespace für Logging (optional)
# [[kv_namespaces]]
# binding = "LOGS"
# id = "your_kv_namespace_id"
